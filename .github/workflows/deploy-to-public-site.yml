name: Deploy BotwaveBomba to Zombie760.github.io

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

env:
  BUN_VERSION: "1.1.29"

jobs:
  deploy:
    name: Build and deploy to public site repo
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout botwave-bomba source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout public site target
        uses: actions/checkout@v4
        with:
          repository: Zombie760/Zombie760.github.io
          token: ${{ secrets.BOTWAVEBOMBA_DEPLOY_PAT }}
          path: public-site

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build site
        run: bun run build
        env:
          BASE_URL: "/botwavebomba"
          DOMAIN: "https://zombie760.github.io"
          BOTWAVE_ROOT: ${{ github.workspace }}

      - name: Copy build into public site
        run: |
          mkdir -p public-site/botwavebomba
          # Remove previously-deployed files that no longer exist in the new build
          # (cp -r only adds/overwrites; orphans like deleted .3mf assets would persist)
          rm -f public-site/botwavebomba/assets/intel-art/3mf/*.3mf 2>/dev/null || true
          rmdir public-site/botwavebomba/assets/intel-art/3mf 2>/dev/null || true
          # Core chrome + verticals — keep in sync with bun run build output
          cp -r \
            index.html black-site.html radar.html refraction.html spool.html dead-drop.html \
            numbers-station.html asset-registry.html tradecraft.html sitrep.html \
            pro.html errata.html perdido.html sin-senal.html offline.html \
            asset-transparency.html 404.html intelligence.html \
            world.html politics.html business.html conflict.html local.html \
            brief.html sources.html methodology.html methodology-transparency.html \
            sigint.html watch.html \
            health.html science.html sports.html tech.html \
            api assets sitemap.xml service-worker.js manifest.json \
            public-site/botwavebomba/ 2>/dev/null || true
          # Per-story deep pages (refraction-{id}.html, sigint-{id}.html, intelligence-{id}.html)
          cp refraction-*.html sigint-*.html intelligence-*.html public-site/botwavebomba/ 2>/dev/null || true

      - name: Commit and push public site
        working-directory: public-site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add botwavebomba
          if git diff --cached --quiet; then
            echo "No changes to deploy"
            exit 0
          fi
          git commit -m "deploy(botwavebomba): sync from botwave-bomba@${{ github.sha }}"
          git push origin main
