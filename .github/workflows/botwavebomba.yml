name: BotwaveBomba — build and deploy to GitHub Pages

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "api/**"
      - "scripts/**"
      - "assets/**"
      - "index.html"
      - "package.json"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BWB_BASE_PATH: /botwavebomba
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven/shim/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Verify data files
        run: |
          test -f api/meta.json
          test -f api/stories_clustered.json
          test -f api/sources_real_seed.json
          test -f api/ownership.json

      - name: Validate JSON inputs
        run: |
          bun -e 'const fs=require("node:fs"); [["api/meta.json"],["api/stories_clustered.json"],["api/sources_real_seed.json"],["api/ownership.json"]].forEach(([p])=>{JSON.parse(fs.readFileSync(p,"utf8"))}); console.log("json ok")'

      - name: Build site
        run: bun run scripts/build_site.ts

      - name: Validate asset pipeline
        run: |
          test -f index.html
          test -f world.html
          test -f politics.html
          test -f conflict.html
          test -f business.html
          test -f tech.html
          test -f sports.html
          test -f local.html
          test -f blindspot.html
          test -f corruption.html
          test -f for-you.html
          test -f brief.html
          test -f story.html
          test -f sources.html
          test -f methodology.html
          test -f pro.html
          test -f corrections.html
          test -f offline.html
          test -f 404.html
          test -f assets/css/botwave.css
          test -f assets/js/botwave.js
          test -f manifest.json
          test -f robots.txt
          test -f sitemap.xml
          test -f service-worker.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '.'
          retention-days: 30

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact-name: botwavebomba-pages
          timeout: 600000
