name: BotwaveBomba CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  BUN_VERSION: "1.1.29"
  NODE_VERSION: "20"

jobs:
  lint-and-test:
    name: Lint, Type-check, Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check (tsc)
        run: bunx tsc --noEmit

      - name: ESLint
        run: bun run lint

      - name: Prettier check
        run: bun run format:check

      - name: Run tests
        run: bun test
        continue-on-error: true # Tests optional until we have them

  build:
    name: Build Static Site
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build site
        run: bun run build

      - name: Verify build output
        run: |
          echo "=== Generated files ==="
          ls -la *.html | wc -l
          test -f index.html || (echo "index.html missing!" && exit 1)
          test -f black-site.html || (echo "black-site.html missing!" && exit 1)
          test -f radar.html || (echo "radar.html missing!" && exit 1)
          test -f spool.html || (echo "spool.html missing!" && exit 1)
          test -f dead-drop.html || (echo "dead-drop.html missing!" && exit 1)
          test -f numbers-station.html || (echo "numbers-station.html missing!" && exit 1)
          test -f asset-registry.html || (echo "asset-registry.html missing!" && exit 1)
          test -f tradecraft.html || (echo "tradecraft.html missing!" && exit 1)
          test -f sigint.html || (echo "sigint.html missing!" && exit 1)
          test -f sports.html || (echo "sports.html missing!" && exit 1)
          test -f tech.html || (echo "tech.html missing!" && exit 1)
          test -f health.html || (echo "health.html missing!" && exit 1)
          test -f science.html || (echo "science.html missing!" && exit 1)

      - name: Size budget check
        run: |
          echo "=== Gzipped size check (< 120KB per page) ==="
          for f in *.html; do
            gzipped=$(gzip -c "$f" | wc -c)
            if [ "$gzipped" -gt 122880 ]; then
              echo "❌ $f: ${gzipped} bytes (limit 122880)"
              exit 1
            else
              echo "✅ $f: ${gzipped} bytes"
            fi
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: botwavebomba-site
          path: |
            *.html
            assets/
            api/
            _headers
            _redirects
            robots.txt
            sitemap*.xml
            manifest.json
          retention-days: 7

  deploy-preview:
    name: Deploy Preview (PRs)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: botwavebomba-site
          path: site

      - name: Deploy to GitHub Pages Preview
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site
          destination_dir: pr-${{ github.event.number }}
          enable_jekyll: false
          force_orphan: true

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 Preview deployed: https://zombie760.github.io/botwavebomba/pr-${{ github.event.number }}/'
            })

  deploy-production:
    name: Deploy to GitHub Pages (main)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: botwavebomba-site
          path: site

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: botwavebomba-site
          path: site

      - name: Create single-file snapshot
        run: |
          cd site
          cat index.html | gzip > ../botwavebomba-${{ github.event.release.tag_name }}.html.gz
          cd ..
          ls -lh botwavebomba-*.html.gz

      - name: Upload release asset
        uses: softprops/action-gh-release@v1
        with:
          files: botwavebomba-${{ github.event.release.tag_name }}.html.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependabot:
    name: Auto-merge Dependabot PRs
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install & test
        run: |
          bun install --frozen-lockfile
          bun run lint
          bun run format:check
          bun run build

      - name: Auto-approve & merge
        run: |
          gh pr review --approve "${{ github.event.pull_request.html_url }}"
          gh pr merge --squash --auto "${{ github.event.pull_request.html_url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
